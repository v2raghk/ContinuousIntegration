name: Exam CI

on:
  push:
    branches: [ "main" ]

jobs:
  check-exam:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file exists
        run: test -f "Maths Exam 1.html"

      - name: Check file not empty
        run: test -s "Maths Exam 1.html"

      - name: Check content
        run: |
          grep -q "Submit Answer" "Maths Exam 1.html" || exit 1
          grep -q "questions" "Maths Exam 1.html" || exit 1
          