<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>11+ Maths Exam Paper 1 - Interactive</title>

<!-- ✅ Better modern font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    display: flex;
    justify-content: center;
    padding: 15px;
    margin: 0;
}

/* ✅ Responsive container */
.container {
    background: white;
    padding: 20px;
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

h2 {
    text-align: center;
    font-weight: 600;
    margin-bottom: 15px;
}

/* ✅ Progress bar */
.progress {
    height: 10px;
    background: #e5e7eb;
    border-radius: 5px;
    margin-bottom: 20px;
    overflow: hidden;
}

.progress-bar {
    height: 10px;
    width: 0%;
    background: #2563eb; /* 🔵 new modern blue */
}

/* ✅ Question styling */
.question {
    font-size: 20px;
    margin: 20px 0;
    text-align: center;
}

/* ✅ Input (mobile optimized) */
input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    text-align: center;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    box-sizing: border-box;
}

/* ✅ Buttons (touch friendly) */
button {
    width: 100%;
    padding: 16px;
    margin-top: 15px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
}

/* 🔵 Primary button */
#submitBtn {
    background: #2563eb;
    color: white;
}

/* 🔷 Secondary button */
#nextBtn {
    background: #0ea5e9;
    color: white;
    display: none;
}

.result {
    text-align: center;
    font-size: 18px;
    margin-top: 20px;
    font-weight: 600;
}

/* ✅ Extra mobile polish */
@media (max-width: 400px) {
    .question {
        font-size: 18px;
    }

    button {
        font-size: 16px;
        padding: 14px;
    }
}
</style>
</head>

<body>

<div class="container">
<h2>11+ Maths Exam (Top Tier)</h2>

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>

<div class="question" id="question"></div>

<input type="number" id="answer" placeholder="Type your answer" autocomplete="off">

<button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>
<button id="nextBtn" onclick="nextQuestion()">Next Question</button>

<div class="result" id="result"></div>
</div>

<script>
const questions = [
{q:"345 + 278", a:623},
{q:"600 ÷ 12", a:50},
{q:"15 × 14", a:210},
{q:"1/2 of 84", a:42},
{q:"25% of 200", a:50},
{q:"7 × 8 - 12", a:44},
{q:"144 ÷ 12", a:12},
{q:"3/4 of 64", a:48},
{q:"18 + 27 + 35", a:80},
{q:"9 × 9 - 15", a:66}
];

let current = 0;
let score = 0;
let locked = false;

function loadQ() {
    document.getElementById("question").innerText = "Q" + (current+1) + ": " + questions[current].q;
    document.getElementById("answer").value = "";
    document.getElementById("answer").disabled = false;
    document.getElementById("submitBtn").style.display = "block";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("result").innerText = "";
    document.getElementById("bar").style.width = (current/questions.length)*100 + "%";
    locked = false;
}

function submitAnswer() {
    if (locked) return;
    let ans = Number(document.getElementById("answer").value);
    let correct = questions[current].a;

    if (ans === correct) {
        score++;
        document.getElementById("result").innerText = "✅ Correct!";
    } else {
        document.getElementById("result").innerText = "❌ Wrong! Answer: " + correct;
    }

    document.getElementById("answer").disabled = true;
    document.getElementById("submitBtn").style.display = "none";
    document.getElementById("nextBtn").style.display = "block";
    locked = true;
}

function nextQuestion() {
    current++;
    if (current >= questions.length) {
        document.querySelector(".container").innerHTML =
        "<h2>Test Finished 🎯</h2><p>Your Score: " + score + "/" + questions.length + "</p>";
        return;
    }
    loadQ();
}

loadQ();
</script>

</body>
</html>
